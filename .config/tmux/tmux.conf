# C-b :source ~/.config/tmux/tmux.conf / C-a r
# source the tmux.conf

set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
# action key
unbind C-b
set-option -g prefix C-a
set-option -g repeat-time 0
set-option -g focus-events on

#### Key bindings
set-window-option -g mode-keys vi
set -g mouse off

# Reload settings
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded"
# Open current directory
bind o run-shell "open #{pane_current_path}"
unbind a
bind -r a move-window -r \; display "Renumber finished"

bind -r e kill-pane -a

# vim-like pane switching
bind -r k select-pane -U 
bind -r j select-pane -D
bind -r l select-pane -R 

unbind %
bind v split-window -h

unbind '"'
bind h split-window -v

unbind &
bind z confirm-before -p "kill-window #P? (y/n)" kill-window

# Moving window
# NOTE: C-S => control-shift
bind-key -n C-S-Left swap-window -t -1 \; previous-window
bind-key -n C-S-Right swap-window -t +1 \; next-window

# Resizing pane
bind -r C-k resize-pane -U 5
bind -r C-j resize-pane -D 5
bind -r C-h resize-pane -L 5
bind -r C-l resize-pane -R 5

# let window starting index as 1
set -g base-index 1

#### basic settings
set-option -g status-justify "left"
set-window-option -g mode-keys vi
set-option -g status-fg white
set-option -g status-bg black
set -g pane-active-border-style fg=colour166,bg=default
# green
# set -g window-style fg=colour10,bg=default
# blue
# set -g window-active-style fg=colour12,bg=default
# black
# set -g window-active-style fg=colour0,bg=default

# important
# control the window text color
# white
set -g window-style fg=colour252,bg=default
set -g window-active-style fg=colour252,bg=default
set-option -g history-limit 64096

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

#### Color
# default statusbar colors
set-option -g status-style bg=colour235,fg=colour136,default

# default window title colors
set-window-option -g window-status-style fg=colour244,bg=colour234,dim

# active window title colors
set-window-option -g window-status-current-style fg=colour166,bg=default,bright

# pane border
set-option -g pane-border-style fg=colour235 #base02
set-option -g pane-active-border-style fg=colour136,bg=colour235

# message text
set-option -g message-style bg=colour235,fg=colour166

# pane number display
set-option -g display-panes-active-colour colour33 #blue
set-option -g display-panes-colour colour166 #orange

# clock
set-window-option -g clock-mode-colour colour64 #green

# allow the title bar to adapt to whatever host you connect to
set -g set-titles on
set -g set-titles-string "#T"

# show pane title
set -g pane-border-status off
# set -g pane-border-format ""
# set -g pane-border-format " [ ###P #T ] "

# import
if-shell "uname -s | grep -q Darwin" "source ~/.config/tmux/macos.conf"

source ~/.config/tmux/status_line.conf
source ~/.config/tmux/utility.conf

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @resurrect-capture-pane-contents 'on'
set -g default-command "which reattach-to-user-namespace > /dev/null && reattach-to-user-namespace -l /bin/zsh || /bin/zsh"
run '~/.tmux/plugins/tpm/tpm'

set-option -g status-position top
set -gu default-command
set -g default-shell /opt/homebrew/bin/fish