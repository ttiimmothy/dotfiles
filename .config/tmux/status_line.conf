setw -g window-status-activity-style "underscore,fg=#eee8d5,bg=#202020"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#eee8d5,bg=#202020"

# original window-status-format #W#F (window, flag)
setw -g window-status-format '#[fg=#202020,bg=#202020]薰ｰ#[default] #I 薰ｱ #W #[fg=#202020,bg=#202020,nobold,nounderscore,noitalics]薰ｰ'
setw -g window-status-current-format '#[fg=#202020,bg=#eee8d5]薰ｰ#[fg=#ff5500,bg=#eee8d5] #I #[fg=#eee8d5,bg=#ff5500]薰ｰ #W #[fg=#ff5500,bg=#202020,nobold]薰ｰ'